<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dorker</title>

<style>
body{background:#000;color:#00ffcc;font-family:monospace;padding:10px;}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;}
#log{background:#000;height:300px;overflow:auto;border:1px solid #00ffcc;margin-top:10px;padding:10px;}
</style>

</head>

<body>

<input id="keyword" placeholder="aws;stripe">

<div class="grid">
{% for e in exts %}
<label><input type="checkbox" class="extbox" value="{{e}}"> {{e}}</label>
{% endfor %}
</div>

<button onclick="selectAll()">Select All</button>
<button onclick="clearAll()">Clear</button>

<br>

<button onclick="start()">START</button>
<button onclick="stop()">STOP</button>
<button onclick="download('txt')">TXT</button>
<button onclick="download('json')">JSON</button>

<div id="log"></div>

<script>
let source;

function log(t){
let el=document.getElementById("log")
let d=document.createElement("div")
d.textContent=t
el.appendChild(d)
el.scrollTop=el.scrollHeight
}

function selectAll(){document.querySelectorAll(".extbox").forEach(e=>e.checked=true)}
function clearAll(){document.querySelectorAll(".extbox").forEach(e=>e.checked=false)}

function getExt(){
let ex=[]
document.querySelectorAll(".extbox:checked").forEach(e=>ex.push(e.value))
return ex
}

function start(){
fetch("/start",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
keyword:keyword.value,
ext:getExt()
})
})

if(source) source.close()
source=new EventSource("/logs")
source.onmessage=e=>log(e.data)
}

function stop(){
fetch("/stop",{method:"POST"})
if(source) source.close()
}

function download(t){
window.open("/download?type="+t)
}
</script>

</body>
</html>
