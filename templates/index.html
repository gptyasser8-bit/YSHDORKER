<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dorker Ultra MAX</title>

<style>
body{background:#050505;color:#00ffcc;font-family:monospace;padding:15px;}
.title{text-align:center;font-size:26px;text-shadow:0 0 15px #00ffcc;margin-bottom:20px;}
.container{max-width:800px;margin:auto;}
input{width:100%;padding:10px;margin-bottom:10px;background:#0a0a0a;border:1px solid #00ffcc;color:#00ffcc;border-radius:8px;}
button{padding:10px;margin:4px;border:none;border-radius:8px;font-weight:bold;cursor:pointer;}
.start{background:#00ffcc;color:#000;}
.stop{background:#ff4d4d;color:#fff;}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.ext{border:1px solid #00ffcc;padding:5px;text-align:center;border-radius:6px;}
#log{background:black;height:200px;overflow:auto;margin-top:10px;padding:10px;}
.card{border:1px solid #00ffcc;padding:8px;margin-top:8px;border-radius:8px;}
</style>
</head>

<body>

<div class="title">⚡ DORKER ULTRA MAX ⚡</div>

<div class="container">

<input id="keyword" placeholder="aws;stripe;token">

<div class="grid">
{% for e in exts %}
<label class="ext"><input type="checkbox" class="extbox" value="{{e}}"> {{e}}</label>
{% endfor %}
</div>

<button onclick="selectAll()">Select All</button>
<button onclick="clearAll()">Clear</button>

<br>

<button class="start" onclick="start()">START</button>
<button class="stop" onclick="stop()">STOP</button>
<button onclick="download('txt')">TXT</button>
<button onclick="download('json')">JSON</button>

<div>Found: <span id="found">0</span> | Speed: <span id="speed">0</span>/s</div>

<div id="log"></div>
<div id="results"></div>

</div>

<script>
let source;

function log(t){
let el=document.getElementById("log")
let d=document.createElement("div")
d.textContent=t
el.appendChild(d)
el.scrollTop=el.scrollHeight
}

function selectAll(){document.querySelectorAll(".extbox").forEach(e=>e.checked=true)}
function clearAll(){document.querySelectorAll(".extbox").forEach(e=>e.checked=false)}

function getExt(){
let ex=[]
document.querySelectorAll(".extbox:checked").forEach(e=>ex.push(e.value))
return ex
}

function start(){
fetch("/start",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
keyword:keyword.value,
ext:getExt()
})
})

if(source) source.close()
source=new EventSource("/logs")
source.onmessage=e=>log(e.data)

setInterval(loadResults,1000)
}

function stop(){
fetch("/stop",{method:"POST"})
if(source) source.close()
}

function download(t){
window.open("/download?type="+t)
}

async function loadResults(){
let r=await fetch("/results")
let data=await r.json()

document.getElementById("found").innerText=data.found
document.getElementById("speed").innerText=data.speed

let div=document.getElementById("results")
div.innerHTML=""

data.results.slice(-50).forEach(x=>{
div.innerHTML+=`<div class="card">${x.url}<br>${x.secrets.join("<br>")}</div>`
})
}
</script>

</body>
</html>
