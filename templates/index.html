<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dorker Ultra</title>

<style>
body{
background:#000;
color:#00ffcc;
font-family:monospace;
padding:12px;
}

/* تحسين الإدخال */
input{
width:100%;
padding:12px;
margin-bottom:10px;
background:#000;
border:1px solid #00ffcc;
color:#00ffcc;
border-radius:10px;
font-size:16px;
}

/* grid responsive */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:8px;
margin-bottom:10px;
}

/* شاشات كبيرة */
@media(min-width:700px){
.grid{
grid-template-columns:repeat(4,1fr);
}
}

label{
border:1px solid #00ffcc;
padding:6px;
border-radius:8px;
text-align:center;
font-size:14px;
}

/* أزرار */
button{
padding:10px;
margin:5px 3px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.start{background:#00ffcc;color:#000;}
.stop{background:#ff4d4d;color:#fff;}
.down{background:#00ff41;color:#000;}
.ctrl{background:#333;color:#fff;}

/* stats */
.stats{
display:flex;
justify-content:space-between;
margin-top:10px;
font-size:14px;
}

/* progress */
.progress{
height:6px;
background:#222;
margin-top:10px;
border-radius:10px;
overflow:hidden;
}

.fill{
height:100%;
width:0%;
background:#00ffcc;
}

/* log */
#log{
background:#000;
height:320px;
overflow:auto;
border:1px solid #00ffcc;
margin-top:12px;
padding:10px;
border-radius:12px;
font-size:13px;
}
</style>

</head>

<body>

<input id="keyword" placeholder="aws;stripe;token">

<div class="grid">
{% for e in exts %}
<label>
<input type="checkbox" class="extbox" value="{{e}}"> {{e}}
</label>
{% endfor %}
</div>

<div>
<button class="ctrl" onclick="selectAll()">Select All</button>
<button class="ctrl" onclick="clearAll()">Clear</button>
</div>

<div>
<button class="start" onclick="start()">START</button>
<button class="stop" onclick="stop()">STOP</button>
<button class="down" onclick="download('txt')">TXT</button>
<button class="down" onclick="download('json')">JSON</button>
</div>

<div class="stats">
<div>Found: <span id="found">0</span></div>
<div>Speed: <span id="speed">0</span>/s</div>
</div>

<div class="progress">
<div class="fill" id="bar"></div>
</div>

<div id="log"></div>

<script>
let source;
let found=0;
let startTime;

function log(t){
let el=document.getElementById("log")

let line=document.createElement("div")
line.textContent=t

if(t.includes("SECRET FOUND")){
line.style.color="#00ff41"
}
else if(t.includes("Checking")){
line.style.color="#00ccff"
}
else if(t.includes("ERROR")){
line.style.color="#ff4d4d"
}

el.appendChild(line)
el.scrollTop=el.scrollHeight
}

function selectAll(){
document.querySelectorAll(".extbox").forEach(e=>e.checked=true)
}

function clearAll(){
document.querySelectorAll(".extbox").forEach(e=>e.checked=false)
}

function getExt(){
let ex=[]
document.querySelectorAll(".extbox:checked").forEach(e=>ex.push(e.value))
return ex
}

function start(){
found=0
document.getElementById("log").innerHTML=""
startTime=Date.now()

fetch("/start",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
keyword:keyword.value,
ext:getExt()
})
})

if(source) source.close()
source=new EventSource("/logs")

source.onmessage=e=>{
log(e.data)

if(e.data.includes("SECRET FOUND")){
found++

document.getElementById("found").innerText=found

let elapsed=(Date.now()-startTime)/1000
let speed=(found/elapsed).toFixed(1)

document.getElementById("speed").innerText=speed

let progress=Math.min(found*2,100)
document.getElementById("bar").style.width=progress+"%"
}
}
}

function stop(){
fetch("/stop",{method:"POST"})
if(source) source.close()
}

function download(t){
window.open("/download?type="+t)
}
</script>

</body>
</html>
