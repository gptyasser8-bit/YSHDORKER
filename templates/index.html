<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dorker Ultra Pro</title>

<style>
body{
background:#050505;
color:#00ffcc;
font-family:monospace;
padding:15px;
}

.title{
text-align:center;
font-size:28px;
font-weight:bold;
text-shadow:0 0 15px #00ffcc;
margin-bottom:20px;
}

.container{
max-width:800px;
margin:auto;
}

input{
width:100%;
padding:12px;
margin-bottom:10px;
background:#0a0a0a;
border:1px solid #00ffcc;
color:#00ffcc;
border-radius:10px;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.start{background:#00ffcc;color:#000;}
.stop{background:#ff4d4d;color:#fff;}
.download{background:#00ff41;color:#000;}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
margin-bottom:10px;
}

.ext{
background:#0a0a0a;
padding:6px;
border-radius:6px;
text-align:center;
border:1px solid #00ffcc;
}

#log{
background:#000;
height:250px;
overflow:auto;
padding:10px;
border-radius:10px;
border:1px solid #00ffcc;
margin-top:10px;
}

.card{
background:#0a0a0a;
border:1px solid #00ffcc;
padding:10px;
margin-top:10px;
border-radius:10px;
}

.stats{
display:flex;
justify-content:space-between;
margin-top:10px;
}

.progress{
height:5px;
background:#222;
margin-top:10px;
border-radius:10px;
overflow:hidden;
}

.fill{
height:100%;
width:0%;
background:#00ffcc;
}
</style>
</head>

<body>

<div class="title">⚡ DORKER ULTRA PRO ⚡</div>

<div class="container">

<label>Keywords (use ;)</label>
<input id="keyword" placeholder="aws;stripe;token">

<label>Year</label>
<input id="year" value="2024">

<label>Extensions</label>

<div class="grid" id="extGrid">
{% for e in exts %}
<label class="ext">
<input type="checkbox" class="extbox" value="{{e}}"> {{e}}
</label>
{% endfor %}
</div>

<button onclick="selectAll()">Select All</button>
<button onclick="clearAll()">Clear</button>

<br>

<button class="start" onclick="start()">START</button>
<button class="stop" onclick="stop()">STOP</button>
<button class="download" onclick="download()">DOWNLOAD</button>

<div class="stats">
<div>Found: <span id="found">0</span></div>
<div>Speed: <span id="speed">0/s</span></div>
</div>

<div class="progress">
<div class="fill" id="bar"></div>
</div>

<div id="log"></div>
<div id="results"></div>

</div>

<script>
let source;
let found=0;
let startTime;

function log(t){
let el=document.getElementById("log")
el.innerHTML += t+"<br>"
el.scrollTop = el.scrollHeight
}

function selectAll(){
document.querySelectorAll(".extbox").forEach(e=>e.checked=true)
}

function clearAll(){
document.querySelectorAll(".extbox").forEach(e=>e.checked=false)
}

function getExt(){
let ex=[]
document.querySelectorAll(".extbox:checked").forEach(e=>{
ex.push(e.value)
})
return ex
}

function start(){
found=0
document.getElementById("log").innerHTML=""
document.getElementById("results").innerHTML=""
startTime=Date.now()

fetch("/start",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
keyword:keyword.value,
year:year.value,
ext:getExt()
})
})

if(source) source.close()
source = new EventSource("/logs")

source.onmessage = e=>{
log(e.data)

if(e.data.includes("FOUND")){
found++
document.getElementById("found").innerText=found

let elapsed=(Date.now()-startTime)/1000
let speed=(found/elapsed).toFixed(1)
document.getElementById("speed").innerText=speed+"/s"

let progress=Math.min(found*5,100)
document.getElementById("bar").style.width=progress+"%"
}
}

setInterval(loadResults,2000)
}

function stop(){
fetch("/stop",{method:"POST"})
if(source) source.close()
}

function download(){
window.open("/download")
}

async function loadResults(){
let r = await fetch("/results")
let data = await r.json()

let div=document.getElementById("results")
div.innerHTML=""

data.results.forEach(x=>{
div.innerHTML += `<div class="card">
<b>${x.url}</b><br>
${x.secrets.join("<br>")}
</div>`
})
}
</script>

</body>
</html>
